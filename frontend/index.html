<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analizador de Torque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0c0f18;
      --surface: #131720;
      --surface2:#1a2030;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent:  #4f9cf9;
      --green:   #52d68a;
      --orange:  #f97316;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --muted2:  #9ca3af;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    .app { display:grid; grid-template-columns:300px 1fr; min-height:100vh; }

    /* sidebar */
    .sidebar {
      background:var(--surface);
      border-right:1px solid var(--border);
      padding:20px 16px;
      display:flex; flex-direction:column; gap:20px;
      overflow-y:auto;
    }

    .logo { display:flex; align-items:center; gap:10px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
    .logo h1 { font-size:0.9rem; font-weight:600; letter-spacing:0.01em; }
    .logo span { font-size:0.75rem; color:var(--muted); font-weight:300; }

    .section-label {
      font-size:0.65rem; font-weight:600; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--muted);
      margin-bottom:8px;
    }

    .field { margin-bottom:10px; }
    .field label { display:block; font-size:0.72rem; color:var(--muted2); margin-bottom:4px; }
    .field input {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      border-radius:7px; padding:7px 10px; color:var(--text);
      font-family:'DM Mono',monospace; font-size:0.82rem; outline:none;
      transition:border-color 0.15s;
    }
    .field input:focus { border-color:var(--accent); }

    /* tabs */
    .tabs { display:flex; gap:4px; background:var(--surface2); border-radius:8px; padding:3px; }
    .tab {
      flex:1; padding:6px; border:none; border-radius:6px;
      background:transparent; color:var(--muted); font-size:0.75rem;
      font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.15s;
    }
    .tab.active { background:var(--surface); color:var(--text); font-weight:500; }

    /* force cards */
    .forces-list { display:flex; flex-direction:column; gap:6px; }
    .force-card {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:9px; padding:10px;
      animation:fadeSlide 0.18s ease;
    }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .force-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .force-badge {
      font-size:0.65rem; font-weight:600; padding:2px 8px;
      border-radius:99px; letter-spacing:0.04em;
    }
    .force-inputs { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .force-inputs label { font-size:0.62rem; color:var(--muted); display:block; margin-bottom:3px; }
    .force-inputs input {
      width:100%; background:var(--bg); border:1px solid var(--border);
      border-radius:5px; padding:5px 7px; color:var(--text);
      font-family:'DM Mono',monospace; font-size:0.78rem; outline:none;
    }
    .force-inputs input:focus { border-color:var(--accent); }
    .btn-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; line-height:1; padding:2px 5px; border-radius:4px; transition:all 0.12s; }
    .btn-remove:hover { color:var(--red); background:rgba(248,113,113,0.1); }

    /* equilibrium panel */
    .eq-panel { display:flex; flex-direction:column; gap:8px; }
    .eq-result {
      background:var(--bg); border:1px solid var(--border);
      border-radius:8px; padding:10px 12px;
      font-size:0.78rem; color:var(--muted2); line-height:1.6;
      min-height:60px;
    }
    .eq-result strong { color:var(--text); font-weight:500; }
    .eq-result .eq-value { font-size:1.1rem; font-weight:600; color:var(--green); font-family:'DM Mono',monospace; }

    /* buttons */
    .btn-add {
      width:100%; padding:8px; background:transparent;
      border:1px dashed var(--border2); border-radius:7px;
      color:var(--muted); font-size:0.78rem; cursor:pointer;
      transition:all 0.15s; font-family:'DM Sans',sans-serif;
    }
    .btn-add:hover { border-color:var(--accent); color:var(--accent); }
    .btn-calc {
      width:100%; padding:9px; background:var(--accent);
      border:none; border-radius:8px; color:#fff;
      font-size:0.82rem; font-weight:600; cursor:pointer;
      transition:all 0.15s; font-family:'DM Sans',sans-serif;
    }
    .btn-calc:hover { background:#3d8ef0; }
    .btn-calc:active { transform:scale(0.98); }
    .btn-calc.loading { opacity:0.5; pointer-events:none; }
    .btn-eq {
      width:100%; padding:8px; background:transparent;
      border:1px solid var(--green); border-radius:7px;
      color:var(--green); font-size:0.78rem; font-weight:500;
      cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif;
    }
    .btn-eq:hover { background:rgba(82,214,138,0.08); }

    .error-msg { font-size:0.75rem; color:var(--red); padding:6px 8px; background:rgba(248,113,113,0.08); border-radius:6px; margin-top:4px; }

    /* main content */
    .main { display:flex; flex-direction:column; padding:20px; gap:16px; }

    /* canvas */
    .canvas-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:0; overflow:hidden;
      flex:1; min-height:420px;
    }
    .canvas-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px; border-bottom:1px solid var(--border);
    }
    .canvas-header span { font-size:0.72rem; color:var(--muted); }
    .status-pill {
      font-size:0.68rem; font-weight:500; padding:3px 10px;
      border-radius:99px; letter-spacing:0.03em;
    }
    .pill-eq  { background:rgba(82,214,138,0.12); color:var(--green); border:1px solid rgba(82,214,138,0.25); }
    .pill-dyn { background:rgba(249,115,22,0.12); color:var(--orange); border:1px solid rgba(249,115,22,0.25); }
    .pill-idle{ background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

    #simCanvas { display:block; width:100%; }

    /* results row */
    .results-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
    .metric {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px;
    }
    .metric-label { font-size:0.65rem; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.06em; }
    .metric-value { font-size:1.25rem; font-weight:600; font-family:'DM Mono',monospace; }

    /* table */
    .table-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .table-panel table { width:100%; border-collapse:collapse; font-size:0.78rem; }
    .table-panel th { padding:9px 12px; text-align:left; font-size:0.65rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
    .table-panel td { padding:8px 12px; border-bottom:1px solid var(--border); font-family:'DM Mono',monospace; font-size:0.76rem; }
    .table-panel tr:last-child td { border-bottom:none; }
    .table-panel tr:hover td { background:rgba(255,255,255,0.02); }
    .dir-badge { padding:2px 7px; border-radius:5px; font-size:0.65rem; font-family:'DM Sans',sans-serif; font-weight:500; }
    .dir-cw  { background:rgba(248,113,113,0.12); color:var(--red); }
    .dir-ccw { background:rgba(79,156,249,0.12);  color:var(--accent); }
    .dir-n   { background:var(--surface2); color:var(--muted); }

    /* canvas tooltip overlay */
    #canvasTooltip {
      position:absolute; background:var(--surface); border:1px solid var(--border2);
      border-radius:8px; padding:8px 11px; font-size:0.72rem; pointer-events:none;
      opacity:0; transition:opacity 0.12s; z-index:10;
      font-family:'DM Mono',monospace; min-width:130px;
    }
    #canvasTooltip.visible { opacity:1; }
    .tooltip-title { font-size:0.65rem; color:var(--muted); margin-bottom:4px; font-family:'DM Sans',sans-serif; }
    .canvas-wrap { position:relative; }

    @media(max-width:800px) { .app{grid-template-columns:1fr;} .sidebar{border-right:none;border-bottom:1px solid var(--border);} }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <div>
        <h1>ANALIZADOR DE TORQUE</h1>
        <span>Física mecánica</span>
      </div>
    </div>

    <!-- Viga -->
    <div>
      <div class="section-label">Viga</div>
      <div class="field">
        <label>Longitud (m)</label>
        <input type="number" id="beamLength" value="10" min="1" max="50" step="0.5" />
      </div>
      <div class="field">
        <label>Posición del pivote (m)</label>
        <input type="number" id="pivot" value="5" min="0" step="0.5" />
      </div>
    </div>

    <!-- Tabs torque / equilibrio -->
    <div>
      <div class="tabs" id="modeTabs">
        <button class="tab active" onclick="setMode('torque')">Torque</button>
        <button class="tab" onclick="setMode('equilibrio')">Equilibrio</button>
      </div>
    </div>

    <!-- Panel torque -->
    <div id="panelTorque">
      <div class="section-label">Fuerzas</div>
      <div class="forces-list" id="forcesList"></div>
      <button class="btn-add" style="margin-bottom:8px" onclick="addForce()">+ Agregar fuerza</button>
      <button class="btn-calc" id="calcBtn" onclick="calculate()">Calcular torque</button>
      <div id="errorMsg"></div>
    </div>

    <!-- Panel equilibrio -->
    <div id="panelEquilibrio" style="display:none">
      <div class="section-label">Fuerzas conocidas</div>
      <div class="forces-list" id="forcesListEq"></div>
      <button class="btn-add" style="margin-bottom:8px" onclick="addForceEq()">+ Agregar fuerza</button>
      <div class="eq-panel">
        <div class="section-label" style="margin-top:4px">Fuerza desconocida</div>
        <div class="field">
          <label>Posición donde calcular (m)</label>
          <input type="number" id="unknownPos" value="8" step="0.5" />
        </div>
        <button class="btn-eq" onclick="calculateEquilibrium()">Calcular fuerza necesaria</button>
      </div>
      <div id="errorMsgEq"></div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────── -->
  <div class="main">

    <!-- Canvas -->
    <div class="canvas-panel">
      <div class="canvas-header">
        <span id="canvasTitle"></span>
        <span class="status-pill pill-idle" id="statusPill"></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="simCanvas" height="400"></canvas>
        <div id="canvasTooltip"><div class="tooltip-title" id="ttTitle"></div><div id="ttBody"></div></div>
      </div>
    </div>

    <!-- Métricas (se llenan tras calcular) -->
    <div class="results-row" id="metricsRow" style="display:none">
      <div class="metric">
        <div class="metric-label">τ total</div>
        <div class="metric-value" id="mTorque">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Estado</div>
        <div class="metric-value" style="font-size:0.9rem" id="mEstado">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Rotación</div>
        <div class="metric-value" style="font-size:0.9rem" id="mRot">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Fórmula</div>
        <div class="metric-value" style="font-size:0.7rem;color:var(--muted)">τ = F·sin(θ)·d</div>
      </div>
    </div>

    <!-- Tabla de resultados -->
    <div class="table-panel" id="tablePanel" style="display:none">
      <table>
        <thead><tr>
          <th>Fuerza</th><th>Pos.</th><th>Magnitud</th><th>Ángulo</th>
          <th>Brazo</th><th>τ</th><th>Dirección</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  // ── Estado global ────────────────────────────────────────────────
  let forceCount   = 0;
  let forceCountEq = 0;
  let mode         = 'torque';
  let lastResult   = null;
  let beamAngle    = 0;
  let targetAngle  = 0;
  let animId       = null;

  // Colores de las fuerzas
  const COLORS = ['#4f9cf9','#f97316','#fbbf24','#52d68a','#c084fc','#f472b6','#34d399'];

  // ── Gestión de modo ──────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.getElementById('panelTorque').style.display     = m === 'torque' ? '' : 'none';
    document.getElementById('panelEquilibrio').style.display = m === 'equilibrio' ? '' : 'none';
    
    // Ocultar resultados de torque al cambiar
    document.getElementById('metricsRow').style.display = 'none';
    document.getElementById('tablePanel').style.display = 'none';
    
    // Resetear etiquetas por defecto
    document.querySelector('#metricsRow .metric:nth-child(1) .metric-label').textContent = 'τ total';
    document.querySelector('#metricsRow .metric:nth-child(2) .metric-label').textContent = 'Estado';
    document.querySelector('#metricsRow .metric:nth-child(3) .metric-label').textContent = 'Rotación';

    document.getElementById('canvasTitle').textContent = '';
    document.getElementById('statusPill').className = 'status-pill pill-idle';
    document.getElementById('statusPill').textContent = '';
    
    // Limpiar resultado de equilibrio y errores
    document.getElementById('eqResult').innerHTML = '';
    document.getElementById('errorMsg').innerHTML = '';
    document.getElementById('errorMsgEq').innerHTML = '';
    
    lastResult = null; // Resetear resultado previo para el canvas

    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i===0 && m==='torque') || (i===1 && m==='equilibrio'));
    });
    redraw();
  }

  // ── Fuerzas (panel torque) ────────────────────────────────────────
  function addForce() {
    forceCount++;
    const color = COLORS[(forceCount-1) % COLORS.length];
    const list  = document.getElementById('forcesList');
    const row   = document.createElement('div');
    row.className = 'force-card';
    row.id = `fc-${forceCount}`;
    row.innerHTML = `
      <div class="force-card-header">
        <span class="force-badge" style="background:${color}18;color:${color};border:1px solid ${color}40">F${forceCount}</span>
        <button class="btn-remove" onclick="removeForce(${forceCount})">✕</button>
      </div>
      <div class="force-inputs">
        <div><label>Pos. (m)</label><input type="number" id="pos-${forceCount}" value="${forceCount*2}" step="0.5" oninput="onForceChange()"/></div>
        <div><label>Mag. (N)</label><input type="number" id="mag-${forceCount}" value="100" step="10" oninput="onForceChange()"/></div>
        <div><label>Ángulo °</label><input type="number" id="ang-${forceCount}" value="90" min="1" max="179" step="5" oninput="onForceChange()"/></div>
      </div>`;
    list.appendChild(row);
    redraw();
  }

  function removeForce(id) {
    const el = document.getElementById(`fc-${id}`);
    if(el) el.remove();
    lastResult = null;
    redraw();
  }

  function getForces() {
    return [...document.querySelectorAll('#forcesList .force-card')].map(row => {
      const id = row.id.split('-')[1];
      return {
        position:  parseFloat(document.getElementById(`pos-${id}`).value)||0,
        magnitude: parseFloat(document.getElementById(`mag-${id}`).value)||0,
        angle:     parseFloat(document.getElementById(`ang-${id}`).value)||90,
      };
    });
  }

  function onForceChange() { lastResult = null; redraw(); }

  // ── Fuerzas (panel equilibrio) ────────────────────────────────────
  function addForceEq() {
    forceCountEq++;
    const color = COLORS[(forceCountEq-1) % COLORS.length];
    const list  = document.getElementById('forcesListEq');
    const row   = document.createElement('div');
    row.className = 'force-card';
    row.id = `fce-${forceCountEq}`;
    row.innerHTML = `
      <div class="force-card-header">
        <span class="force-badge" style="background:${color}18;color:${color};border:1px solid ${color}40">F${forceCountEq}</span>
        <button class="btn-remove" onclick="removeForceEq(${forceCountEq})">✕</button>
      </div>
      <div class="force-inputs">
        <div><label>Pos. (m)</label><input type="number" id="eqpos-${forceCountEq}" value="${forceCountEq*2}" step="0.5"/></div>
        <div><label>Mag. (N)</label><input type="number" id="eqmag-${forceCountEq}" value="100" step="10"/></div>
        <div><label>Ángulo °</label><input type="number" id="eqang-${forceCountEq}" value="90" min="1" max="179" step="5"/></div>
      </div>`;
    list.appendChild(row);
  }

  function removeForceEq(id) {
    const el = document.getElementById(`fce-${id}`);
    if(el) el.remove();
  }

  function getForcesEq() {
    return [...document.querySelectorAll('#forcesListEq .force-card')].map(row => {
      const id = row.id.split('-')[1];
      return {
        position:  parseFloat(document.getElementById(`eqpos-${id}`).value)||0,
        magnitude: parseFloat(document.getElementById(`eqmag-${id}`).value)||0,
        angle:     parseFloat(document.getElementById(`eqang-${id}`).value)||90,
      };
    });
  }

  // ── API: calcular torque ─────────────────────────────────────────
  async function calculate() {
    const pivot      = parseFloat(document.getElementById('pivot').value);
    const beamLength = parseFloat(document.getElementById('beamLength').value);
    const forces     = getForces();
    const errEl      = document.getElementById('errorMsg');
    errEl.innerHTML  = '';

    if(!forces.length){ errEl.innerHTML='<div class="error-msg">Agrega al menos una fuerza.</div>'; return; }

    const btn = document.getElementById('calcBtn');
    btn.textContent='Calculando…'; btn.classList.add('loading');

    try {
      const res  = await fetch('/api/physics/torque',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({pivot,beamLength,forces}),
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error);
      lastResult = data;
      renderResults(data);
      startAnimation(data);
    } catch(err) {
      errEl.innerHTML=`<div class="error-msg">${err.message}</div>`;
    } finally {
      btn.textContent='Calcular torque'; btn.classList.remove('loading');
    }
  }

  // ── API: calcular equilibrio ─────────────────────────────────────
  async function calculateEquilibrium() {
    const pivot          = parseFloat(document.getElementById('pivot').value);
    const beamLength     = parseFloat(document.getElementById('beamLength').value);
    const forces         = getForcesEq();
    const unknownPosition= parseFloat(document.getElementById('unknownPos').value);
    const errEl          = document.getElementById('errorMsgEq');
    const resultEl       = document.getElementById('eqResult');
    errEl.innerHTML = '';

    if(!forces.length){ errEl.innerHTML='<div class="error-msg">Agrega al menos una fuerza conocida.</div>'; return; }

    try {
      const res  = await fetch('/api/physics/equilibrium',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({pivot,forces,unknownPosition}),
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error);

      // Mostrar resultados en la sección principal
      document.getElementById('metricsRow').style.display = '';
      document.getElementById('tablePanel').style.display = '';

      const dir = data.requiredForce >= 0 ? 'Arriba' : 'Abajo';
      document.getElementById('mTorque').textContent = data.knownTorque + ' N·m';
      document.getElementById('mTorque').style.color = 'var(--text)';
      document.getElementById('mEstado').textContent = Math.abs(data.requiredForce).toFixed(2) + ' N';
      document.getElementById('mEstado').style.color = 'var(--green)';
      document.getElementById('mRot').textContent    = dir;

      // Actualizar etiquetas de las métricas para que tengan sentido en equilibrio
      document.querySelector('#metricsRow .metric:nth-child(1) .metric-label').textContent = 'Σ τ conocidos';
      document.querySelector('#metricsRow .metric:nth-child(2) .metric-label').textContent = 'F necesaria';
      document.querySelector('#metricsRow .metric:nth-child(3) .metric-label').textContent = 'Dirección F';

      // Actualizar pill de estado
      const pill = document.getElementById('statusPill');
      pill.textContent = 'EQUILIBRIO';
      pill.className = 'status-pill pill-eq';
      document.getElementById('canvasTitle').textContent = 'Equilibrio calculado';

      // Dibujar en canvas la fuerza resultante junto a las conocidas
      const allForces = [...forces, {
        position: unknownPosition, 
        magnitude: Math.abs(data.requiredForce), 
        angle: 90, 
        isResult: true, 
        direction: data.requiredForce >= 0 ? 'antihorario' : 'horario', // Simplificado para la tabla
        leverArm: data.unknownLeverArm,
        torque: (data.requiredForce * data.unknownLeverArm).toFixed(2)
      }];

      // Actualizar tabla
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = allForces.map((f, i) => {
        const isUnknown = f.isResult;
        const color = isUnknown ? 'var(--green)' : COLORS[i % COLORS.length];
        const name = isUnknown ? 'F?' : `F${i+1}`;
        const dc = f.direction === 'horario' ? 'dir-cw' : f.direction === 'antihorario' ? 'dir-ccw' : 'dir-n';
        
        return `<tr>
          <td style="color:${color}">${name}</td>
          <td>${f.position} m</td><td>${f.magnitude.toFixed(2)} N</td><td>${f.angle}°</td>
          <td>${f.leverArm ? f.leverArm.toFixed(2) : Math.abs(f.position - pivot).toFixed(2)} m</td>
          <td style="font-weight:500">${f.torque || (f.magnitude * Math.sin(f.angle * Math.PI / 180) * (f.position - pivot)).toFixed(2)} N·m</td>
          <td><span class="dir-badge ${dc}">${f.direction || '—'}</span></td>
        </tr>`;
      }).join('');

      drawDynamic({forces:allForces.map(f=>({...f,torque:0,direction:'neutro'})), totalTorque:0, isEquilibrium:true, pivot, beamLength}, 0, allForces);

    } catch(err) {
      errEl.innerHTML=`<div class="error-msg">${err.message}</div>`;
    }
  }

  // ── Renderizar resultados ────────────────────────────────────────
  function renderResults(data) {
    document.getElementById('metricsRow').style.display = '';
    document.getElementById('tablePanel').style.display = '';

    document.getElementById('mTorque').textContent = data.totalTorque + ' N·m';
    document.getElementById('mTorque').style.color = data.isEquilibrium ? 'var(--green)' : 'var(--orange)';
    document.getElementById('mEstado').style.color = 'var(--text)';
    document.getElementById('mEstado').textContent = data.isEquilibrium ? 'Estático' : 'Dinámico';
    document.getElementById('mRot').textContent    = data.rotationDirection || '—';

    // Resetear etiquetas de métricas por si venían de equilibrio
    document.querySelector('#metricsRow .metric:nth-child(1) .metric-label').textContent = 'τ total';
    document.querySelector('#metricsRow .metric:nth-child(2) .metric-label').textContent = 'Estado';
    document.querySelector('#metricsRow .metric:nth-child(3) .metric-label').textContent = 'Rotación';

    document.getElementById('canvasTitle').textContent =
      data.isEquilibrium ? 'Sistema en equilibrio estático' : `Rotación ${data.rotationDirection} · τ = ${data.totalTorque} N·m`;



    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.forces.map((f,i)=>{
      const dc = f.direction==='horario' ? 'dir-cw' : f.direction==='antihorario' ? 'dir-ccw' : 'dir-n';
      return `<tr>
        <td style="color:${COLORS[i%COLORS.length]}">F${i+1}</td>
        <td>${f.position} m</td><td>${f.magnitude} N</td><td>${f.angle}°</td>
        <td>${f.leverArm} m</td>
        <td style="font-weight:500">${f.torque} N·m</td>
        <td><span class="dir-badge ${dc}">${f.direction}</span></td>
      </tr>`;
    }).join('');
  }

  // ── Animación ────────────────────────────────────────────────────
  function startAnimation(data) {
    if(animId) cancelAnimationFrame(animId);
    const MAX = Math.PI/5;
    if(data.isEquilibrium) {
      targetAngle = 0;
    } else {
      const norm = data.totalTorque / 500;
      targetAngle = Math.max(-MAX, Math.min(MAX, Math.atan(norm)*1.2));
    }
    animateLoop(data);
  }

  function animateLoop(data) {
    beamAngle += (targetAngle - beamAngle) * 0.07;
    drawDynamic(data, beamAngle);
    if(Math.abs(targetAngle - beamAngle) > 0.0008) {
      animId = requestAnimationFrame(()=>animateLoop(data));
    } else {
      beamAngle = targetAngle;
      drawDynamic(data, beamAngle);
    }
  }

  // ── Redibujado en tiempo real (sin resultado) ────────────────────
  function redraw() {
    if(animId) cancelAnimationFrame(animId);
    if(lastResult) {
      startAnimation(lastResult);
    } else {
      beamAngle = 0; targetAngle = 0;
      drawDynamic(null, 0);
    }
  }

  // ── Motor de dibujo ──────────────────────────────────────────────
  function drawDynamic(data, angle, overrideForces) {
    const canvas = document.getElementById('simCanvas');
    const ctx    = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth || 900;
    const W = canvas.width, H = 400;
    canvas.height = H;

    const beamLength = parseFloat(document.getElementById('beamLength').value)||10;
    const pivot      = parseFloat(document.getElementById('pivot').value)||5;
    const forces     = overrideForces || (mode==='torque' ? getForces() : getForcesEq());

    const pivotX = W/2, pivotY = H*0.50;
    const scale  = (W*0.80)/beamLength;
    const leftD  = pivot * scale;
    const rightD = (beamLength-pivot)*scale;
    const cos = Math.cos(angle), sin = Math.sin(angle);

    const x1 = pivotX - leftD*cos,  y1 = pivotY - leftD*sin;
    const x2 = pivotX + rightD*cos, y2 = pivotY + rightD*sin;

    // Fondo
    ctx.fillStyle = '#0c0f18';
    ctx.fillRect(0,0,W,H);

    // Línea de referencia horizontal
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth=1; ctx.setLineDash([5,8]);
    ctx.beginPath(); ctx.moveTo(x1+(y1-pivotY),pivotY); ctx.lineTo(x2-(y2-pivotY),pivotY); ctx.stroke();
    ctx.setLineDash([]);

    // Soporte del pivote
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pivotX-18,pivotY+22); ctx.lineTo(pivotX+18,pivotY+22); ctx.stroke();
    for(let i=-3;i<=3;i++){
      ctx.beginPath(); ctx.moveTo(pivotX+i*6-3,pivotY+22); ctx.lineTo(pivotX+i*6-9,pivotY+30); ctx.stroke();
    }

    // Pivote
    ctx.fillStyle='#4f9cf9';
    ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(pivotX-11,pivotY+20); ctx.lineTo(pivotX+11,pivotY+20); ctx.closePath(); ctx.fill();

    // Viga: color según estado
    let beamColor = '#2d4a6e';
    if(data && !data.isEquilibrium) beamColor = angle>0 ? '#6b3a1e' : '#1e4a6b';

    ctx.strokeStyle = beamColor;
    ctx.lineWidth=16; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

    // Brillo de la viga
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x1+sin*4,y1-cos*4); ctx.lineTo(x2+sin*4,y2-cos*4); ctx.stroke();

    // Marcas de escala
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
    for(let i=0;i<=beamLength;i++){
      const t=i/beamLength, mx=x1+(x2-x1)*t, my=y1+(y2-y1)*t;
      const tl=i%5===0?8:i%2===0?5:3;
      ctx.beginPath(); ctx.moveTo(mx-sin*tl,my+cos*tl); ctx.lineTo(mx+sin*tl,my-cos*tl); ctx.stroke();
      if(i%2===0 && Math.abs(angle)<0.25){
        ctx.fillStyle='rgba(107,114,128,0.9)'; ctx.font='11px DM Sans,sans-serif'; ctx.textAlign='center';
        ctx.fillText(`${i}m`, mx, my+cos*20+sin*4);
      }
    }

    // Flechas de fuerzas
    forces.forEach((f,i)=>{
      const t=Math.max(0,Math.min(1,f.position/beamLength));
      const fx=x1+(x2-x1)*t, fy=y1+(y2-y1)*t;
      const color = f.isResult ? '#52d68a' : COLORS[i%COLORS.length];
      const arrowH = Math.min(80, Math.max(32, Math.abs((f.magnitude||100)/2.5)));
      const aRad   = ((f.angle||90)*Math.PI)/180;
      const adx    = -Math.sin(Math.PI/2-aRad+angle)*arrowH*0.2;
      const ady    = -arrowH;

      // línea
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx+adx,fy+ady); ctx.stroke();

      // punta
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(fx-5,fy-12); ctx.lineTo(fx+5,fy-12); ctx.closePath(); ctx.fill();

      // etiqueta nombre
      ctx.fillStyle=color; ctx.font='500 11px DM Sans,sans-serif'; ctx.textAlign='center';
      const label = f.isResult ? 'F?' : `F${i+1}`;
      ctx.fillText(label, fx+adx, fy+ady-12);

      // valor
      ctx.font='10px DM Mono,monospace'; ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fillText(`${Math.round(f.magnitude)}N`, fx+adx, fy+ady-24);

      // torque individual si hay resultado
      if(data && data.forces && data.forces[i] && !f.isResult){
        const tv = data.forces[i].torque;
        ctx.fillStyle = Math.abs(tv)>0.001 ? color+'cc' : 'rgba(107,114,128,0.6)';
        ctx.font='9px DM Mono,monospace';
        ctx.fillText(`τ=${tv}`, fx, fy+26);
      }
    });

    // ángulo
    if(Math.abs(angle)>0.005){
      ctx.fillStyle='rgba(107,114,128,0.6)'; ctx.font='10px DM Mono,monospace'; ctx.textAlign='right';
      ctx.fillText(`θ = ${(angle*180/Math.PI).toFixed(1)}°`, W-14, H-12);
    }
  }

  // ── Drag en canvas para mover fuerzas ────────────────────────────
  let dragging = null;

  document.getElementById('simCanvas').addEventListener('mousedown', e=>{
    const canvas = document.getElementById('simCanvas');
    const rect   = canvas.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(canvas.width/rect.width);
    const my = (e.clientY-rect.top)*(canvas.height/rect.height);

    const beamLength = parseFloat(document.getElementById('beamLength').value)||10;
    const pivot      = parseFloat(document.getElementById('pivot').value)||5;
    const W=canvas.width, pivotX=W/2, pivotY=canvas.height*0.50;
    const scale=(W*0.80)/beamLength;
    const forces = mode==='torque' ? getForces() : getForcesEq();

    forces.forEach((f,i)=>{
      const t=Math.max(0,Math.min(1,f.position/beamLength));
      const x1=pivotX-(pivot*scale)*Math.cos(beamAngle);
      const y1=pivotY-(pivot*scale)*Math.sin(beamAngle);
      const x2=pivotX+((beamLength-pivot)*scale)*Math.cos(beamAngle);
      const y2=pivotY+((beamLength-pivot)*scale)*Math.sin(beamAngle);
      const fx=x1+(x2-x1)*t, fy=y1+(y2-y1)*t;
      if(Math.hypot(mx-fx,my-fy)<18) {
        dragging={i,mode};
        e.preventDefault();
      }
    });
  });

  document.getElementById('simCanvas').addEventListener('mousemove', e=>{
    const canvas = document.getElementById('simCanvas');
    const rect   = canvas.getBoundingClientRect();
    const mx = (e.clientX-rect.left)*(canvas.width/rect.width);

    const beamLength = parseFloat(document.getElementById('beamLength').value)||10;
    const pivot      = parseFloat(document.getElementById('pivot').value)||5;
    const W=canvas.width, pivotX=W/2;
    const scale=(W*0.80)/beamLength;
    const leftEdge  = pivotX - pivot*scale*Math.cos(beamAngle);
    const totalPx   = beamLength*scale;
    const newPos    = Math.max(0,Math.min(beamLength, ((mx-leftEdge)/totalPx)*beamLength));

    if(dragging!==null){
      const idPrefix = dragging.mode==='torque' ? 'pos-' : 'eqpos-';
      const rows = dragging.mode==='torque'
        ? [...document.querySelectorAll('#forcesList .force-card')]
        : [...document.querySelectorAll('#forcesListEq .force-card')];
      if(rows[dragging.i]){
        const id=rows[dragging.i].id.split('-')[1];
        const inp=document.getElementById(idPrefix+id);
        if(inp){ inp.value=parseFloat(newPos.toFixed(2)); }
      }
      lastResult=null; redraw();
    }

    // Tooltip hover
    const tooltip = document.getElementById('canvasTooltip');
    const forces = mode==='torque' ? getForces() : getForcesEq();
    let found=false;
    forces.forEach((f,i)=>{
      const t=Math.max(0,Math.min(1,f.position/beamLength));
      const x1c=pivotX-(pivot*scale)*Math.cos(beamAngle);
      const y1c=(canvas.height*0.50)-(pivot*scale)*Math.sin(beamAngle);
      const x2c=pivotX+((beamLength-pivot)*scale)*Math.cos(beamAngle);
      const y2c=(canvas.height*0.50)+((beamLength-pivot)*scale)*Math.sin(beamAngle);
      const fx=x1c+(x2c-x1c)*t, fy=y1c+(y2c-y1c)*t;
      const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
      const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
      if(Math.hypot(cx-fx,cy-fy)<22){
        document.getElementById('ttTitle').textContent=`F${i+1}`;
        document.getElementById('ttBody').innerHTML=
          `Pos: ${f.position} m<br>Mag: ${f.magnitude} N<br>Ángulo: ${f.angle}°`;
        const tx=e.clientX-rect.left+12, ty=e.clientY-rect.top-10;
        tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
        tooltip.classList.add('visible'); found=true;
      }
    });
    if(!found) tooltip.classList.remove('visible');
  });

  document.addEventListener('mouseup', ()=>{ dragging=null; });

  // ── Listeners de inputs en tiempo real ──────────────────────────
  document.getElementById('beamLength').addEventListener('input',()=>{ lastResult=null; redraw(); });
  document.getElementById('pivot').addEventListener('input',()=>{ lastResult=null; redraw(); });

  // ── Init ─────────────────────────────────────────────────────────
  window.addEventListener('load',()=>{
    addForce(); addForce();
    addForceEq();
  });
  window.addEventListener('resize',()=>redraw());
</script>
</body>
